openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: profiles
    description: Proxy profile management
  - name: keys
    description: API key management
  - name: access-keys
    description: Layer-level access key management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /profiles:
    get:
      operationId: listProfiles
      tags: [profiles]
      summary: List all profiles
      responses:
        "200":
          description: List of profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Profile"
    post:
      operationId: createProfile
      tags: [profiles]
      summary: Create a profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProfileBody"
      responses:
        "201":
          description: Created profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profiles/{id}:
    get:
      operationId: getProfile
      tags: [profiles]
      summary: Get a profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateProfile
      tags: [profiles]
      summary: Update a profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteProfile
      tags: [profiles]
      summary: Delete a profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profiles/{id}/keys:
    get:
      operationId: listProfileKeys
      tags: [keys]
      summary: List API keys for a profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of API keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApiKey"
    post:
      operationId: addProfileKey
      tags: [keys]
      summary: Add an API key to a profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddKeyBody"
      responses:
        "201":
          description: Added key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKey"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profiles/{id}/keys/{keyId}:
    patch:
      operationId: updateProfileKey
      tags: [keys]
      summary: Update an API key's value or label
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: keyId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileKeyBody"
      responses:
        "200":
          description: Updated key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKey"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteProfileKey
      tags: [keys]
      summary: Remove an API key from a profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: keyId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profiles/{id}/rotate-key:
    post:
      operationId: rotateProfileKey
      tags: [keys]
      summary: Manually rotate to next API key
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rotated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /access-keys:
    get:
      operationId: listAccessKeys
      tags: [access-keys]
      summary: List all layer access keys
      responses:
        "200":
          description: List of access keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LayerAccessKey"
    post:
      operationId: createAccessKey
      tags: [access-keys]
      summary: Create a new layer access key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccessKeyBody"
      responses:
        "201":
          description: Created access key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LayerAccessKey"

  /access-keys/{id}:
    delete:
      operationId: deleteAccessKey
      tags: [access-keys]
      summary: Delete a layer access key
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Profile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        targetUrl:
          type: string
        currentKeyIndex:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
        keys:
          type: array
          items:
            $ref: "#/components/schemas/ApiKey"
      required:
        - id
        - name
        - targetUrl
        - currentKeyIndex
        - createdAt
        - updatedAt
        - keys

    ApiKey:
      type: object
      properties:
        id:
          type: integer
        profileId:
          type: integer
        label:
          type: ["string", "null"]
        keyValue:
          type: string
        createdAt:
          type: string
      required:
        - id
        - profileId
        - label
        - keyValue
        - createdAt

    CreateProfileBody:
      type: object
      properties:
        name:
          type: string
        targetUrl:
          type: string
      required:
        - name
        - targetUrl

    UpdateProfileBody:
      type: object
      properties:
        name:
          type: string
        targetUrl:
          type: string

    AddKeyBody:
      type: object
      properties:
        keyValue:
          type: string
        label:
          type: ["string", "null"]
      required:
        - keyValue

    LayerAccessKey:
      type: object
      properties:
        id:
          type: integer
        label:
          type: ["string", "null"]
        keyValue:
          type: string
        createdAt:
          type: string
      required:
        - id
        - label
        - keyValue
        - createdAt

    UpdateProfileKeyBody:
      type: object
      properties:
        keyValue:
          type: string
        label:
          type: ["string", "null"]
      required: []

    CreateAccessKeyBody:
      type: object
      properties:
        label:
          type: ["string", "null"]
      required: []

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
