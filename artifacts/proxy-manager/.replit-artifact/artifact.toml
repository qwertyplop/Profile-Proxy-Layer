kind = "web"
previewPath = "/"
title = "Proxy Manager"
version = "1.0.0"
id = "artifacts/proxy-manager"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26124

[services.development]
run = "pnpm --filter @workspace/proxy-manager run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/proxy-manager", "run", "build" ]
publicDir = "artifacts/proxy-manager/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26124"
BASE_PATH = "/"
